name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify:
    name: Pre-release verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.64.8
          install-mode: goinstall

      - name: Tests
        run: go test -race -timeout 10m ./...

      - name: Connection & security tests
        run: go test -race -tags conntest -timeout 5m ./internal/db/conntest/...

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

      # The release page leads with this narrative. Fail here, before anything is
      # published, rather than ship a page that reads as a commit log.
      - name: Release notes exist for this tag
        run: ./scripts/release-notes.sh "${GITHUB_REF_NAME}" > /dev/null

  release:
    name: Release
    needs: [verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install Cloudsmith CLI
        run: pip install cloudsmith-cli

      # RELEASE_SUMMARY is rendered at the top of the release body by
      # .goreleaser.yaml. Single-sourced from RELEASES.md so the narrative that
      # ships to strangers is the same one that lives in the repo.
      - name: Load release notes from RELEASES.md
        run: |
          {
            echo 'RELEASE_SUMMARY<<PGMI_RELEASE_NOTES_EOF'
            ./scripts/release-notes.sh "${GITHUB_REF_NAME}"
            echo 'PGMI_RELEASE_NOTES_EOF'
          } >> "$GITHUB_ENV"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}