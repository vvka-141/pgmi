name: CI

on:
  push:
    branches: [main, develop, 'feature/**', 'feature-*', 'features/**']
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.64.8
          install-mode: goinstall

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run tests
        run: go test -race -coverprofile=coverage.out -timeout 10m ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
        continue-on-error: true

  connection-tests:
    name: Connection & Security Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run connection tests
        run: go test -race -tags conntest -timeout 5m ./internal/db/conntest/...

  example-test-gated:
    name: Example — test-gated deployment
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGMI_CONNECTION_STRING: postgresql://postgres:postgres@127.0.0.1:5434/postgres
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build pgmi
        run: go build -o pgmi ./cmd/pgmi

      - name: Success path — tests pass, deployment commits
        working-directory: examples/test-gated-deploy
        run: ../../pgmi deploy . -d pgmi_example --force

      - name: Failure path — failing test rolls the whole deployment back
        working-directory: examples/test-gated-deploy
        run: |
          cp break-it/test_audit_log.sql __test__/
          set +e
          ../../pgmi deploy . -d pgmi_example_broken --force
          code=$?
          set -e
          test "$code" -eq 13 || { echo "expected exit 13, got $code"; exit 1; }

      - name: Verify rollback — the failed deploy left no trace
        run: |
          rolled_back=$(PGPASSWORD=postgres psql -h 127.0.0.1 -p 5434 -U postgres -d pgmi_example_broken -tAc \
            "SELECT to_regclass('public.audit_log') IS NULL")
          test "$rolled_back" = "t" || { echo "audit_log survived the rollback"; exit 1; }

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, connection-tests, example-test-gated]
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -ldflags="-s -w -X github.com/vvka-141/pgmi/internal/cli.version=dev-${{ github.sha }}" \
            -o dist/pgmi-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }} \
            ./cmd/pgmi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pgmi-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
